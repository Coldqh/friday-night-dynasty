name: Repository smoke check

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repository-smoke-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke check
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Pass
        run: echo "Repository push accepted"
